[pytest]
# Pytest configuration for MasterDatabase tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 7.0

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src/database
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80

# Markers for test organization
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow-running tests
    database: Database tests
    regression: End-to-end regression scenarios that spawn WIMI (tests/wimi_test/scenarios/)

# Coverage options
[coverage:run]
source = src/database
omit = 
    */tests/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
