<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Deep Dive - WIMI</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/subject_deep_dive.css">
    <!-- Stage 9: multi-parent selector + source markers share styles. -->
    <link rel="stylesheet" href="../css/weight.css">
</head>
<body>
    <div class="page-container">
        <!-- Header -->
        <header class="subject-header">
            <div class="header-left">
                <a href="analytics_dashboard.html" class="back-link" id="backToAnalytics" data-testid="deep-dive-nav-back">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M12.5 5L7.5 10L12.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Back to Analytics
                </a>
            </div>
            <div class="header-center">
                <svg class="subject-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="currentColor" stroke-width="2"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="currentColor" stroke-width="2"/>
                </svg>
                <h1 id="subjectTitle" data-testid="deep-dive-subject-title">Subject Deep Dive</h1>
            </div>
            <div class="header-right">
                <span class="exam-label" id="examLabel" data-testid="deep-dive-exam-label">Loading...</span>
            </div>
        </header>

        <!-- Subject Info & Trend -->
        <section class="info-trend-section">
            <div class="info-trend-grid">
                <!-- Subject Info -->
                <div class="info-card">
                    <h2 class="card-title">Subject Info</h2>
                    <div class="info-content">
                        <div class="info-item">
                            <label>Full Path:</label>
                            <span id="fullPath" data-testid="deep-dive-subject-fullpath-value">-</span>
                        </div>
                        <div class="info-item">
                            <label>Exam Weight:</label>
                            <span id="examWeight" data-testid="deep-dive-weight-value">-</span>
                        </div>
                        <!--
                            Stage 9 (WEIGHT_ALLOCATION_IMPLEMENTATION_PLAN.md):
                            Multi-parent context selector. Hidden by default; the
                            renderer reveals it only when the subject has more
                            than one parent edge. testids:
                              - multi-parent-selector              (the wrapper)
                              - multi-parent-selector-control      (the <select>)
                              - multi-parent-selector-option-{pid} (each option)
                        -->
                        <div
                            id="multiParentSelector"
                            class="multi-parent-selector"
                            data-testid="multi-parent-selector"
                            style="display:none;"
                        ></div>
                    </div>
                </div>

                <!-- Trend -->
                <div class="trend-card">
                    <h2 class="card-title">Trend</h2>
                    <div class="trend-content">
                        <div class="trend-row">
                            <div class="trend-col">
                                <label>This Week:</label>
                                <span class="trend-value" id="thisWeek" data-testid="deep-dive-trend-thisweek-value">-</span>
                            </div>
                            <div class="trend-col">
                                <label>Last Week:</label>
                                <span class="trend-value" id="lastWeek" data-testid="deep-dive-trend-lastweek-value">-</span>
                            </div>
                        </div>
                        <div class="trend-change" id="trendChange" data-testid="deep-dive-trend-change">
                            -
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Stats -->
        <section class="stats-section">
            <h2 class="section-title">Statistics</h2>
            <div class="stats-grid">
                <div class="stat-card" data-testid="deep-dive-stat-mistakes">
                    <div class="stat-label">Total Mistakes</div>
                    <div class="stat-value" id="totalMistakes">-</div>
                </div>
                <div class="stat-card" data-testid="deep-dive-stat-percentage">
                    <div class="stat-label">% of All Mistakes</div>
                    <div class="stat-value" id="percentageOfAll">-</div>
                </div>
                <div class="stat-card" data-testid="deep-dive-stat-difficulty">
                    <div class="stat-label">Avg Difficulty</div>
                    <div class="stat-value" id="avgDifficulty">-</div>
                </div>
                <div class="stat-card" data-testid="deep-dive-stat-last-mistake">
                    <div class="stat-label">Last Mistake</div>
                    <div class="stat-value" id="lastMistake">-</div>
                </div>
            </div>
        </section>

        <!-- Mistakes Over Time -->
        <section class="timeline-section">
            <h2 class="section-title">Mistakes Over Time</h2>
            <div class="timeline-card">
                <canvas id="timelineChart" width="800" height="200" data-testid="deep-dive-chart-timeline"></canvas>
            </div>
        </section>

        <!-- Child Subjects & Common Mistake Types -->
        <section class="breakdown-section">
            <div class="breakdown-grid">
                <!-- Child Subjects -->
                <div class="breakdown-card">
                    <h2 class="card-title">Child Subjects</h2>
                    <div class="child-subjects-list" id="childSubjectsList">
                        <!-- Will be populated dynamically -->
                    </div>
                </div>

                <!-- Common Mistake Types -->
                <div class="breakdown-card">
                    <h2 class="card-title">Common Mistake Types</h2>
                    <div class="mistake-types-list" id="mistakeTypesList">
                        <!-- Will be populated dynamically -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Recent Entries -->
        <section class="recent-entries-section">
            <h2 class="section-title">Recent Entries</h2>
            <div class="recent-entries-card">
                <div class="recent-entries-list" id="recentEntriesList">
                    <!-- Will be populated dynamically -->
                </div>
            </div>
        </section>

        <!-- Related Topics & Recommendations -->
        <section class="related-section">
            <div class="related-grid">
                <!-- Related Topics (Siblings) -->
                <div class="related-card">
                    <h2 class="card-title">Related Topics (Siblings)</h2>
                    <div class="related-topics-list" id="relatedTopicsList">
                        <!-- Will be populated dynamically -->
                    </div>
                </div>

                <!-- Recommendations -->
                <div class="recommendations-card">
                    <h2 class="card-title">Recommendations</h2>
                    <div class="recommendations-list" id="recommendationsList">
                        <!-- Will be populated dynamically -->
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script src="../js/lib/d3.v7.min.js"></script>
    <script src="../js/api/_bridge.js"></script>
    <script src="../js/api/_loader.js"></script>
    <script src="../js/themes.js"></script>
    <script src="../js/event_bus.js"></script>
    <script src="../js/plugin_loader.js"></script>
    <script src="../js/subject_deep_dive.js"></script>
</body>
</html>
