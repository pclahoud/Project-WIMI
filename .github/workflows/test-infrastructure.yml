# WIMI test-infrastructure CI (T6.1, starter scaffold).
#
# This is the *initial* CI workflow for the wimi_test suite. It runs the
# pytest suite on Ubuntu only — macOS and Windows runners are deferred
# until the Linux pipeline is stable (see docs/testing/CI_SETUP.md
# §"Adding macOS and Windows runners later").
#
# Notes for future maintainers:
#   - Python is pinned to 3.11.x (major.minor only). Do NOT pin patch
#     versions or hash specific package versions here; that belongs in
#     requirements-prod.txt / a future requirements-dev.txt.
#   - The slow-marked tests drive the existing QtWebEngine via CDP using
#     ``pychrome`` (a thin CDP client). pychrome installs as a single pure
#     Python wheel — there is no equivalent of ``playwright install``
#     because pychrome talks directly to Qt's already-running CDP server
#     and never spawns a browser of its own. (Originally this stack was
#     specced over Playwright; the migration to pychrome is documented in
#     docs/planning/PYCHROME_MIGRATION.md.)
#   - On failure, pytest_artifacts/ is uploaded so the failed-run
#     screenshots, console logs, and network captures are inspectable.

name: test-infrastructure

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-infrastructure:
    name: pytest (ubuntu-latest, python 3.11)
    runs-on: ubuntu-latest

    env:
      # CI=true is already set by GitHub Actions, but we set
      # QT_QPA_PLATFORM explicitly here too so the wimi_test subprocesses
      # spawned by fixtures inherit it directly. The conftest.py hook is
      # the belt; this is the suspenders.
      CI: "true"
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # System libraries required by PyQt6 + QtWebEngine when running
      # headless. Grouped here (not split into per-package steps) so the
      # apt cache is hit once. The list is the well-known PyQt6/Qt6
      # offscreen subset — if a future Qt minor version adds a new
      # transitive dep, the failure surfaces as a clean ``could not load
      # the Qt platform plugin "offscreen"`` error and the missing .so is
      # in the message.
      - name: Install Qt offscreen system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libglib2.0-0 libdbus-1-3 \
            libxkbcommon0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-sync1 libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 \
            libxcomposite1 libxdamage1 libxrandr2 libxtst6 \
            libnss3 libasound2t64

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-prod.txt ]; then pip install -r requirements-prod.txt; fi
          # Test deps. ``pychrome`` is the CDP client used by the slow-marked
          # suite to drive QtWebEngine; it installs as a pure Python wheel
          # and needs no post-install step (originally this slot was filled
          # by ``playwright`` + a deliberate skip of ``playwright install``;
          # see docs/planning/PYCHROME_MIGRATION.md for the migration
          # rationale).
          pip install pytest pytest-html pychrome

      - name: Run unit suite (pytest -m "not slow")
        run: pytest -m "not slow" --html=pytest_artifacts/unit-report.html --self-contained-html

      - name: Run slow suite (pytest -m slow)
        # ``QT_QPA_PLATFORM=offscreen`` (set at the job level) is enough
        # for QtWebEngine to render without a display server. xvfb-run is
        # not needed; if a specific test requires a real X server in the
        # future, wrap it locally rather than the whole suite.
        run: pytest -m slow --html=pytest_artifacts/slow-report.html --self-contained-html

      - name: Upload pytest artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-artifacts
          path: pytest_artifacts/
          if-no-files-found: ignore
          retention-days: 14
